<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Money — 個人財務管理</title>
<style>
:root{
  --bg:#FBFAF7; --card:#ffffff; --text:#2C2C2A; --muted:#6b6a64; --faint:#9b9a93;
  --line:rgba(0,0,0,0.10); --accent:#1D9E75; --warn:#BA7517; --field:#ffffff; --chip:#f1efe9;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1a1a18; --card:#242421; --text:#E8E6DF; --muted:#9c9a92; --faint:#6f6e68;
    --line:rgba(255,255,255,0.12); --accent:#5DCAA5; --warn:#EF9F27; --field:#1f1f1d; --chip:#2c2c28; }
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.6;}
.app{max-width:560px;margin:0 auto;padding-bottom:40px;}
header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:0.5px solid var(--line);padding:14px 16px 0;}
.brand{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:20px;margin:0 0 10px;letter-spacing:.01em;}
.tabs{display:flex;gap:4px;}
.tab{flex:1;text-align:center;font-size:13px;padding:10px 4px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
main{padding:18px 16px;}
.card{background:var(--card);border:0.5px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
.eb{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:0 0 12px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;}
.row .l{color:var(--muted);}
.num{font-variant-numeric:tabular-nums;}
.big{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-variant-numeric:tabular-nums;line-height:1;margin:0;}
.cap{font-size:13px;color:var(--muted);margin:8px 0 0;}
.bar{height:10px;background:var(--bg);border:0.5px solid var(--line);border-radius:6px;overflow:hidden;margin-top:8px;}
.fill{height:100%;background:var(--accent);border-radius:6px;transition:width .3s;}
.tot{border-top:0.5px solid var(--line);margin-top:8px;padding-top:10px;font-weight:600;}
input,select,textarea{font:inherit;color:var(--text);background:var(--field);border:0.5px solid var(--line);border-radius:8px;padding:7px 9px;}
input[type=number]{text-align:right;font-variant-numeric:tabular-nums;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;}
.fr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;gap:10px;}
.fr .l{color:var(--muted);white-space:nowrap;}
.fr input{width:120px;}
.btn{font:inherit;font-size:14px;padding:10px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;}
.btn.ghost{background:transparent;border:0.5px solid var(--line);color:var(--muted);font-weight:400;}
.btn.full{width:100%;}
.chip{font-size:12px;padding:5px 10px;border-radius:999px;background:var(--chip);border:none;color:var(--muted);cursor:pointer;font-family:inherit;}
.mgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.mbtn{font:inherit;font-size:13px;padding:7px 0 5px;border:0.5px solid var(--line);border-radius:8px;background:var(--field);color:var(--text);cursor:pointer;text-align:center;}
.mbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.mk{display:block;font-size:9px;line-height:1;color:var(--accent);}
.mbtn.on .mk{color:#fff;}
.txn{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:6px 0;border-bottom:0.5px solid var(--line);}
.txn .x{color:var(--faint);cursor:pointer;padding:0 4px;font-size:16px;}
.note{font-size:12.5px;color:var(--muted);line-height:1.6;}
.goal{margin-bottom:16px;}
.goal .gh{display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px;}
.done{color:var(--accent);font-weight:600;}
.eta{color:var(--faint);font-size:12px;}
textarea{width:100%;min-height:90px;resize:vertical;}
.lead{font-size:13px;color:var(--accent);font-weight:600;}
.flag{font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s;}
.flag.on{opacity:1;}
.split3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.mini{background:var(--bg);border:0.5px solid var(--line);border-radius:10px;padding:10px;text-align:center;}
.mini .v{font-variant-numeric:tabular-nums;font-weight:600;font-size:15px;}
.mini .k{font-size:11px;color:var(--muted);margin-top:2px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <p class="brand">Money <span class="flag" id="flag">保存しました</span></p>
    <div class="tabs">
      <button class="tab on" data-t="dash">概要</button>
      <button class="tab" data-t="input">入力</button>
      <button class="tab" data-t="goals">貯金</button>
      <button class="tab" data-t="tax">税</button>
      <button class="tab" data-t="set">設定</button>
    </div>
  </header>
  <main>
    <div id="dash"></div>
    <div id="input" style="display:none;"></div>
    <div id="goals" style="display:none;"></div>
    <div id="tax" style="display:none;"></div>
    <div id="set" style="display:none;"></div>
  </main>
</div>

<script>
(function(){
  var KEY='finance:v1';
  var THRESHOLDS=[900000,2150000,2750000,3250000];
  var GNAMES=['生活防衛 90万','結婚 125万','生活防衛 ＋60万','出産 50万'];
  var DEF={ start:'2026-01', taxReserve:375000, planCash:60000, planKyosai:10000, planNisa:10000, months:{},
    tax:{ uri:4780000, keihi:960000, nenkin:210000, kokuho2026:17000, kyosaiY:120000, idecoY:0, genzen:340000,
      jigyoTax:true, rJuminzei:0.10, juminFlat:6000, rKokuho:0.096, kokuhoFlat:55000, kokuhoCap:890000 } };
  var state=JSON.parse(JSON.stringify(DEF));
  var mem=null, active='dash', selMonth=null;

  function $(id){return document.getElementById(id);}
  function yen(n){return '¥'+Math.round(n).toLocaleString();}
  function man(n){return (n/10000).toFixed(1)+'万';}
  function pad(n){return String(n).padStart(2,'0');}
  function nowKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1);}
  function parseKey(k){var p=k.split('-');return {y:+p[0],m:+p[1]};}
  function addMonth(k,d){var p=parseKey(k);var t=(p.y*12+(p.m-1))+d;return Math.floor(t/12)+'-'+pad((t%12)+1);}
  function between(a,b){var pa=parseKey(a),pb=parseKey(b);return (pb.y*12+pb.m-1)-(pa.y*12+pa.m-1);}
  function label(k){var p=parseKey(k);return p.y+'年'+p.m+'月';}

  function ledgerOf(m){
    var r=state.months[m]||{};
    var income=(r.income!=null)?r.income:370000;
    var exp=(r.exp||[]).reduce(function(s,x){return s+(+x.amt||0);},0);
    var ky=(r.kyosai!=null)?r.kyosai:state.planKyosai;
    var ni=(r.nisa!=null)?r.nisa:state.planNisa;
    return {income:income,exp:exp,kyosai:ky,nisa:ni,suggested:income-exp-ky-ni,cashSaved:(r.cashSaved!=null?r.cashSaved:null),closed:(r.cashSaved!=null)};
  }
  function contribOf(m){
    var r=state.months[m]; if(!r||r.cashSaved==null) return null;
    var ky=(r.kyosai!=null)?r.kyosai:state.planKyosai;
    var ni=(r.nisa!=null)?r.nisa:state.planNisa;
    return {cash:r.cashSaved,nisa:ni,kyosai:ky};
  }
  function closedCount(){return Object.keys(state.months).filter(function(m){return state.months[m].cashSaved!=null;}).length;}
  function curCum(){
    var keys=Object.keys(state.months).sort();
    var cash=0,nisa=0,ky=0,reached=false;
    keys.forEach(function(m){var c=contribOf(m); if(!c)return; cash+=c.cash; nisa+=c.nisa; ky+=c.kyosai; if(cash>=900000)reached=true;});
    return {cash:cash,nisa:nisa,ky:ky,reached:reached,eligible:cash+(reached?nisa:0)};
  }
  function shouldBe(){
    var el=closedCount();
    var cash=0,nisa=0,reached=false;
    for(var i=0;i<el;i++){cash+=state.planCash;nisa+=state.planNisa;if(cash>=900000)reached=true;}
    return {eligible:cash+(reached?nisa:0),months:el};
  }
  function etaMonth(th){
    var c=curCum(); if(c.eligible>=th) return null;
    var cash=c.cash,nisa=c.nisa,reached=c.reached;
    for(var i=1;i<=180;i++){cash+=state.planCash;nisa+=state.planNisa;if(cash>=900000)reached=true;
      if(cash+(reached?nisa:0)>=th) return addMonth(nowKey(),i);}
    return null;
  }
  function activeGoal(){
    var e=curCum().eligible;
    for(var i=0;i<THRESHOLDS.length;i++){ if(e<THRESHOLDS[i]){
      var prev=i===0?0:THRESHOLDS[i-1];
      return {idx:i,name:GNAMES[i],th:THRESHOLDS[i],prev:prev,
        pct:Math.max(0,Math.min(100,Math.round((e-prev)/(THRESHOLDS[i]-prev)*100))),
        remain:THRESHOLDS[i]-e, eta:etaMonth(THRESHOLDS[i])};
    }}
    return null;
  }

  /* ---------- persistence (localStorage) ---------- */
  var flagT;
  function save(){
    mem=state;
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
    var f=$('flag'); if(f){f.classList.add('on'); clearTimeout(flagT); flagT=setTimeout(function(){f.classList.remove('on');},900);}
  }
  function load(){
    try{ var v=localStorage.getItem(KEY); if(v){ state=Object.assign(JSON.parse(JSON.stringify(DEF)),JSON.parse(v)); } }
    catch(e){ if(mem)state=mem; }
    state.tax=Object.assign(JSON.parse(JSON.stringify(DEF.tax)), state.tax||{});
  }

  /* ---------- DASHBOARD ---------- */
  function renderDash(){
    var c=curCum(), sb=shouldBe(), g=activeGoal();
    var diff=c.eligible-sb.eligible;
    var hero;
    if(g){
      hero='<div class="card">'
        +'<p class="eb">直近ゴール</p>'
        +'<div style="display:flex;align-items:baseline;gap:12px;"><p class="big" style="font-size:46px;color:var(--accent);">'+g.pct+'<span style="font-size:22px;">%</span></p><span style="font-size:14px;color:var(--muted);">'+g.name+'</span></div>'
        +'<div class="bar" style="height:12px;"><div class="fill" style="width:'+g.pct+'%"></div></div>'
        +'<p class="cap">あと '+man(g.remain)+''+(g.eta?' ・ このペースで '+label(g.eta)+' 到達予定':'')+'</p>'
        +'</div>';
    } else {
      hero='<div class="card"><p class="eb">ゴール</p><p class="big" style="font-size:32px;color:var(--accent);">全ゴール達成 🎉</p><p class="cap">次の目標を設定できます。</p></div>';
    }
    var diffCard='<div class="card"><p class="eb">計画との差</p>'
      +'<div class="row"><span class="l">本来あるべき累計（今）</span><span class="num">'+man(sb.eligible)+'</span></div>'
      +'<div class="row"><span class="l">実際の累計（現状）</span><span class="num" style="color:var(--accent);font-weight:600;">'+man(c.eligible)+'</span></div>'
      +'<div class="row tot"><span>'+(diff>=0?'計画より先行':'計画より遅れ')+'</span><span class="num" style="color:'+(diff>=0?'var(--accent)':'var(--warn)')+';">'+(diff>=0?'＋':'−')+man(Math.abs(diff))+'</span></div>'
      +'</div>';
    var breakdown='<div class="card"><p class="eb">内訳</p><div class="split3">'
      +'<div class="mini"><div class="v">'+man(c.cash)+'</div><div class="k">現金</div></div>'
      +'<div class="mini"><div class="v">'+man(c.nisa)+'</div><div class="k">NISA</div></div>'
      +'<div class="mini"><div class="v">'+man(c.ky)+'</div><div class="k">共済（老後）</div></div>'
      +'</div>'
      +'<div class="row" style="margin-top:10px;"><span class="l">2027税の予備（隔離）</span><span class="num">'+man(state.taxReserve)+'</span></div>'
      +'<div class="row"><span class="l">2027の税の山（概算）</span><span class="num">'+man(taxCalc().mountain)+'</span></div>'
      +'<div class="row"><span class="l">予備＋還付との差</span><span class="num" style="color:'+(taxCalc().gap>=0?'var(--accent)':'var(--warn)')+';">'+(taxCalc().gap>=0?'＋':'−')+man(Math.abs(taxCalc().gap))+'</span></div>'
      +'<p class="note" style="margin-top:6px;">NISAは生活防衛90万の達成後にゴールへ充当。共済と税予備はゴールの計算には含めません。</p>'
      +'</div>';
    var cm=nowKey(), lo=ledgerOf(cm);
    var thisMonth='<div class="card"><p class="eb">今月（'+label(cm)+'）</p>'
      +'<div class="row"><span class="l">収入</span><span class="num">'+yen(lo.income)+'</span></div>'
      +'<div class="row"><span class="l">支出</span><span class="num">'+yen(lo.exp)+'</span></div>'
      +(lo.closed
         ?'<div class="row tot"><span>現金貯金（確定）</span><span class="num" style="color:'+(lo.cashSaved>=0?'var(--accent)':'var(--warn)')+';">'+yen(lo.cashSaved)+'</span></div>'
         :'<div class="row tot"><span>手残りの目安</span><span class="num">'+yen(lo.suggested)+'</span></div><p class="note">「入力」タブで現金貯金を確定すると累計に反映されます。</p>')
      +'</div>';
    $('dash').innerHTML=hero+diffCard+breakdown+thisMonth;
  }

  /* ---------- INPUT ---------- */
  function ensureMonth(m){ if(!state.months[m]) state.months[m]={income:370000,kyosai:state.planKyosai,nisa:state.planNisa,exp:[]}; return state.months[m]; }
  function clampSel(){ if(!selMonth) selMonth=nowKey(); }
  function renderInput(){
    clampSel();
    var sy=parseKey(selMonth).y, sm=parseKey(selMonth).m, mgrid='';
    for(var mm=1;mm<=12;mm++){var mk=sy+'-'+pad(mm);var has=!!state.months[mk];var cl=has&&state.months[mk].cashSaved!=null;var on=(mk===selMonth);var mark=cl?'●':(has?'·':'&nbsp;');mgrid+='<button class="mbtn'+(on?' on':'')+'" data-m="'+mk+'">'+mm+'月<span class="mk">'+mark+'</span></button>';}
    var lo=ledgerOf(selMonth);
    var stored=state.months[selMonth]||{};
    var exp=(stored.exp||[]);
    var txnHtml=exp.length?exp.map(function(x,i){return '<div class="txn"><span>'+(x.d||'')+' '+(x.cat||'')+'</span><span><span class="num">'+yen(x.amt)+'</span> <span class="x" data-del="'+i+'">×</span></span></div>';}).join(''):'<p class="note">まだ支出の記録がありません。</p>';
    var cats=['家賃','食費','光熱費','日用品','交際費','経費','その他'];
    var chips=cats.map(function(c){return '<button class="chip" data-cat="'+c+'">'+c+'</button>';}).join(' ');
    $('input').innerHTML=
      '<div class="card"><p class="eb">記録する月</p>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><button class="chip" id="yprev">‹ 前年</button><span style="font-weight:600;font-variant-numeric:tabular-nums;">'+sy+'年 '+sm+'月</span><button class="chip" id="ynext">翌年 ›</button></div>'
      +'<div class="mgrid">'+mgrid+'</div>'
      +(lo.closed?'<p class="note" style="color:var(--accent);margin-top:10px;">この月は確定済み（累計に反映中）。●＝確定 ・ ·＝記録あり</p>':'<p class="note" style="margin-top:10px;">下の「現金貯金（実績）」を入れると、この月が累計に反映されます。●＝確定 ・ ·＝記録あり</p>')+'</div>'
      +'<div class="card"><p class="eb">収入</p><div class="fr"><span class="l">今月の収入</span><input type="number" id="income" step="10000" value="'+lo.income+'"></div>'
      +'<p class="note">定常の受取は約37万（CFD25＋FDAT12）。スポット収入があれば足してください。</p></div>'
      +'<div class="card"><p class="eb">支出（日次クイック入力）</p>'
      +'<div class="fr" style="flex-wrap:wrap;gap:6px;"><input type="date" id="qd" style="flex:1;min-width:130px;"><input type="text" id="qc" placeholder="カテゴリ" style="flex:1;min-width:90px;"><input type="number" id="qa" placeholder="金額" step="100" style="width:96px;"></div>'
      +'<div style="margin:6px 0 10px;">'+chips+'</div>'
      +'<button class="btn full" id="addExp">支出を追加</button>'
      +'<div style="margin-top:12px;">'+txnHtml+'</div>'
      +'<div class="row tot"><span>支出 合計</span><span class="num">'+yen(lo.exp)+'</span></div></div>'
      +'<div class="card"><p class="eb">月次バッチ取り込み</p>'
      +'<p class="note" style="margin-bottom:8px;">メモアプリ等から貼り付け。1行＝1支出。例「06/28 食費 1200」。日付やカテゴリは省略可。</p>'
      +'<textarea id="paste" placeholder="06/28 食費 1200&#10;06/29 交通費 480"></textarea>'
      +'<button class="btn full ghost" id="imp" style="margin-top:8px;">この月に取り込む</button></div>'
      +'<div class="card"><p class="eb">貯金（この月）</p>'
      +'<div class="fr"><span class="l">小規模企業共済</span><input type="number" id="ky" step="1000" value="'+lo.kyosai+'"></div>'
      +'<div class="fr"><span class="l">NISA</span><input type="number" id="ni" step="1000" value="'+lo.nisa+'"></div>'
      +'<div class="fr"><span class="l">現金貯金（実績）</span><input type="number" id="cs" step="5000" placeholder="未入力" value="'+(lo.cashSaved!=null?lo.cashSaved:'')+'"></div>'
      +'<button class="btn full ghost" id="calc" style="margin-top:4px;">手残りから計算して入れる（'+yen(lo.suggested)+'）</button>'
      +'<p class="note" style="margin-top:8px;">現金貯金＝収入−支出−共済−NISA。実額を入れるか、ボタンで手残りから計算できます。ここを入れた月だけが累計に反映されます。</p></div>';

    $('yprev').addEventListener('click',function(){selMonth=(sy-1)+'-'+pad(sm);renderInput();});
    $('ynext').addEventListener('click',function(){selMonth=(sy+1)+'-'+pad(sm);renderInput();});
    document.querySelectorAll('#input .mbtn').forEach(function(b){b.addEventListener('click',function(){selMonth=b.dataset.m;renderInput();});});
    $('income').addEventListener('input',function(){ensureMonth(selMonth).income=+this.value||0;save();});
    $('ky').addEventListener('input',function(){ensureMonth(selMonth).kyosai=+this.value||0;save();renderDash();});
    $('ni').addEventListener('input',function(){ensureMonth(selMonth).nisa=+this.value||0;save();renderDash();});
    $('cs').addEventListener('input',function(){var v=this.value;ensureMonth(selMonth).cashSaved=(v===''?null:(+v||0));save();renderDash();});
    $('calc').addEventListener('click',function(){var s=ledgerOf(selMonth).suggested;ensureMonth(selMonth).cashSaved=s;save();renderInput();renderDash();});
    $('qd').value=selMonth+'-'+pad(new Date().getDate());
    document.querySelectorAll('#input [data-cat]').forEach(function(b){b.addEventListener('click',function(){$('qc').value=b.dataset.cat;});});
    $('addExp').addEventListener('click',function(){
      var amt=+$('qa').value; if(!amt)return;
      ensureMonth(selMonth).exp.push({d:($('qd').value||'').slice(5),cat:$('qc').value||'',amt:amt});
      save();renderInput();
    });
    document.querySelectorAll('#input [data-del]').forEach(function(b){b.addEventListener('click',function(){state.months[selMonth].exp.splice(+b.dataset.del,1);save();renderInput();});});
    $('imp').addEventListener('click',function(){
      var lines=($('paste').value||'').split('\n'); var added=0;
      lines.forEach(function(ln){ ln=ln.trim(); if(!ln)return;
        var nums=ln.match(/\d[\d,]*/g); if(!nums)return;
        var amt=+nums[nums.length-1].replace(/,/g,''); if(!amt)return;
        var dm=ln.match(/(\d{1,2})[\/\-](\d{1,2})/); var d=dm?pad(+dm[1])+'-'+pad(+dm[2]):'';
        var cat=ln.replace(/\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/,'').replace(/\d{1,2}[\/\-]\d{1,2}/,'').replace(/[\d,]+\s*$/,'').trim();
        ensureMonth(selMonth).exp.push({d:d,cat:cat,amt:amt}); added++;
      });
      if(added){$('paste').value='';save();renderInput();}
    });
  }

  /* ---------- GOALS ---------- */
  function renderGoals(){
    var c=curCum();
    var planHtml='<div class="card"><p class="eb">貯金プラン（毎月）</p>'
      +'<div class="fr"><span class="l">想定の現金貯金／月</span><input type="number" id="pc" step="5000" value="'+state.planCash+'"></div>'
      +'<div class="fr"><span class="l">小規模企業共済／月</span><input type="number" id="pk" step="1000" value="'+state.planKyosai+'"></div>'
      +'<div class="fr"><span class="l">NISA／月</span><input type="number" id="pn" step="1000" value="'+state.planNisa+'"></div>'
      +'<p class="note">この想定額は将来の到達予定の計算に使います（実績は「入力」タブの記録が優先）。</p></div>';
    var gh='';
    THRESHOLDS.forEach(function(th,i){
      var prev=i===0?0:THRESHOLDS[i-1];
      var seg=th-prev; var got=Math.max(0,Math.min(seg,c.eligible-prev));
      var pct=Math.round(got/seg*100);
      var reached=c.eligible>=th;
      var eta=reached?null:etaMonth(th);
      gh+='<div class="goal"><div class="gh"><span>'+GNAMES[i]+'</span>'+(reached?'<span class="done">達成</span>':'<span class="eta">あと '+man(th-c.eligible)+(eta?' ・ '+label(eta):'')+'</span>')+'</div>'
        +'<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div></div>';
    });
    var goalsCard='<div class="card"><p class="eb">ゴール（目標 vs 実績）</p>'+gh
      +'<p class="note" style="margin-top:6px;">生活防衛90万までは現金のみ。達成後はNISAも結婚以降のゴールに充当されます。</p></div>';
    $('goals').innerHTML=planHtml+goalsCard;
    $('pc').addEventListener('input',function(){state.planCash=+this.value||0;save();renderGoals();renderDash();});
    $('pk').addEventListener('input',function(){state.planKyosai=+this.value||0;save();renderGoals();});
    $('pn').addEventListener('input',function(){state.planNisa=+this.value||0;save();renderGoals();renderDash();});
  }

  /* ---------- SETTINGS ---------- */
  function renderSet(){
    $('set').innerHTML=
      '<div class="card"><p class="eb">税の予備枠（隔離）</p>'
      +'<div class="fr"><span class="l">2027税の予備</span><input type="number" id="tr" step="10000" value="'+state.taxReserve+'"></div>'
      +'<p class="note">手元現金80万から引っ越し費用（約42.5万）を引いた残りを置く想定。ゴールの計算には含めません。</p></div>'
      +'<div class="card"><p class="eb">トラッカー開始月</p>'
      +'<div class="fr"><span class="l">開始</span><input type="month" id="st" value="'+state.start+'"></div></div>'
      +'<div class="card"><p class="eb">バックアップ</p>'
      +'<button class="btn full ghost" id="exp">データを書き出す（コピー用）</button>'
      +'<textarea id="bk" readonly style="margin-top:8px;display:none;"></textarea>'
      +'<p class="note" style="margin:10px 0 6px;">復元：書き出したテキストを下に貼って取り込み。</p>'
      +'<textarea id="impbox" placeholder="バックアップのテキストを貼り付け"></textarea>'
      +'<button class="btn full ghost" id="impbtn" style="margin-top:8px;">取り込んで復元</button></div>'
      +'<div class="card"><p class="eb">リセット</p><button class="btn full ghost" id="rs">すべての入力を消去</button></div>';
    $('tr').addEventListener('input',function(){state.taxReserve=+this.value||0;save();renderDash();});
    $('st').addEventListener('change',function(){state.start=this.value;save();renderInput();renderGoals();renderDash();});
    $('exp').addEventListener('click',function(){var t=$('bk');t.style.display='block';t.value=JSON.stringify(state);t.select();try{navigator.clipboard.writeText(t.value);}catch(e){}});
    $('impbtn').addEventListener('click',function(){try{var o=JSON.parse($('impbox').value);state=Object.assign(JSON.parse(JSON.stringify(DEF)),o);state.tax=Object.assign(JSON.parse(JSON.stringify(DEF.tax)),state.tax||{});save();renderAll();switchTab('dash');}catch(e){$('impbox').style.outline='2px solid var(--warn)';}});
    $('rs').addEventListener('click',function(){state=JSON.parse(JSON.stringify(DEF));selMonth=null;save();renderAll();switchTab('dash');});
  }

  /* ---------- TAX ENGINE (フェーズ2・概算) ---------- */
  function shotokuzei(x){var t;if(x<=1950000)t=x*0.05;else if(x<=3300000)t=x*0.10-97500;else if(x<=6950000)t=x*0.20-427500;else if(x<=9000000)t=x*0.23-636000;else if(x<=18000000)t=x*0.33-1536000;else t=x*0.40-2796000;return Math.max(0,Math.round(t*1.021));}
  function taxCalc(){
    var t=state.tax, aoiro=650000;
    var jigyo=Math.max(0,t.uri-t.keihi-aoiro);
    var shaho=t.nenkin+t.kokuho2026;
    var ded=t.kyosaiY+t.idecoY;
    var csShotoku=Math.max(0,jigyo-(480000+shaho+ded));
    var income=shotokuzei(csShotoku);
    var refund=t.genzen-income; // +なら還付
    var csJumin=Math.max(0,jigyo-(430000+shaho+ded));
    var jumin=Math.round(csJumin*t.rJuminzei+t.juminFlat);
    var kokuho=Math.min(t.kokuhoCap,Math.round(Math.max(0,jigyo-430000)*t.rKokuho+t.kokuhoFlat));
    var jigyoZei=t.jigyoTax?Math.round(Math.max(0,jigyo-2900000)*0.05):0;
    var mountain=jumin+kokuho+jigyoZei;
    var reserve=state.taxReserve+Math.max(0,refund);
    return {jigyo:jigyo,income:income,refund:refund,jumin:jumin,kokuho:kokuho,jigyoZei:jigyoZei,mountain:mountain,reserve:reserve,gap:reserve-mountain};
  }

  /* ---------- TAX TAB ---------- */
  function renderTax(){
    var t=state.tax, r=taxCalc();
    function row(l,v,col){return '<div class="row"><span class="l">'+l+'</span><span class="num"'+(col?' style="color:'+col+';"':'')+'>'+v+'</span></div>';}
    function inp(id,val,step){return '<input type="number" id="'+id+'" step="'+(step||10000)+'" value="'+val+'">';}
    $('tax').innerHTML=
      '<div class="card"><p class="eb">2027に来る税の山（概算）</p>'
      +'<p class="big" style="font-size:38px;color:var(--warn);">'+man(r.mountain)+'</p>'
      +'<p class="cap">2026の所得をもとに、2027に請求される住民税・国保・個人事業税の合計</p>'
      +'<div style="margin-top:12px;">'
      +row('住民税（2027/6〜）',yen(r.jumin))
      +row('国民健康保険（2027/6〜）',yen(r.kokuho))
      +(r.jigyoZei>0?row('個人事業税（2027/8）',yen(r.jigyoZei)):'')
      +'</div>'
      +'<div class="row tot"><span>'+(r.gap>=0?'予備＋還付で足りる':'予備＋還付では不足')+'</span><span class="num" style="color:'+(r.gap>=0?'var(--accent)':'var(--warn)')+';">'+(r.gap>=0?'＋':'−')+man(Math.abs(r.gap))+'</span></div>'
      +'<p class="note" style="margin-top:6px;">取り置き原資＝税予備 '+man(state.taxReserve)+' ＋ 所得税の還付見込み '+man(Math.max(0,r.refund))+'。</p></div>'

      +'<div class="card"><p class="eb">2026 所得税の精算</p>'
      +row('事業所得（売上−経費−青色65万）',yen(r.jigyo))
      +row('所得税（概算）',yen(r.income))
      +row('源泉徴収済み',yen(t.genzen))
      +'<div class="row tot"><span>'+(r.refund>=0?'還付（戻ってくる）':'追納（払う）')+'</span><span class="num" style="color:'+(r.refund>=0?'var(--accent)':'var(--warn)')+';">'+(r.refund>=0?'＋':'−')+yen(Math.abs(r.refund))+'</span></div>'
      +'<p class="note" style="margin-top:6px;">確定申告（2027年3月）で精算。源泉が多ければ還付されます。</p></div>'

      +'<div class="card"><p class="eb">2026の収入・控除（入力）</p>'
      +'<div class="fr"><span class="l">年間売上</span>'+inp('t_uri',t.uri)+'</div>'
      +'<div class="fr"><span class="l">年間経費</span>'+inp('t_keihi',t.keihi)+'</div>'
      +'<div class="fr"><span class="l">国民年金（年）</span>'+inp('t_nenkin',t.nenkin,1000)+'</div>'
      +'<div class="fr"><span class="l">国保（2026に払う・年）</span>'+inp('t_kokuho26',t.kokuho2026,1000)+'</div>'
      +'<div class="fr"><span class="l">小規模企業共済（年）</span>'+inp('t_kyosai',t.kyosaiY,1000)+'</div>'
      +'<div class="fr"><span class="l">iDeCo（年）</span>'+inp('t_ideco',t.idecoY,1000)+'</div>'
      +'<div class="fr"><span class="l">源泉徴収済み（年）</span>'+inp('t_genzen',t.genzen,1000)+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:6px;"><button class="btn ghost" id="t_pull" style="flex:1;">2026の実績を合計</button><button class="btn ghost" id="t_est" style="flex:1;">月平均×12で見積もる</button></div>'
      +'<p class="note" id="t_pullnote" style="margin-top:6px;"></p>'
      +'<p class="note" style="margin-top:2px;">取り込みは2026年（1〜12月）の記録のみを対象に合算。売上＝定常の受取ベース（CFD源泉前を含むのが正確）。経費は「経費」カテゴリで記録した支出。</p></div>'

      +'<div class="card"><p class="eb">詳細設定（自治体の料率）</p>'
      +'<div class="fr"><span class="l">個人事業税の対象</span><select id="t_jt"><option value="1"'+(t.jigyoTax?' selected':'')+'>対象</option><option value="0"'+(!t.jigyoTax?' selected':'')+'>対象外</option></select></div>'
      +'<div class="fr"><span class="l">住民税率</span><input type="number" id="t_rj" step="0.01" value="'+t.rJuminzei+'"></div>'
      +'<div class="fr"><span class="l">国保 所得割率</span><input type="number" id="t_rk" step="0.001" value="'+t.rKokuho+'"></div>'
      +'<div class="fr"><span class="l">国保 均等割等（年）</span><input type="number" id="t_kf" step="1000" value="'+t.kokuhoFlat+'"></div>'
      +'<p class="note" style="margin-top:6px;">初期値は東京・三鷹あたりの概算（40歳未満・介護分なし）。正確な料率は自治体の通知に合わせて調整してください。すべて概算で、確定額ではありません。</p></div>';

    function bind(id,key,parse){var e=$(id);if(!e)return;e.addEventListener('input',function(){state.tax[key]=parse?parse(this.value):(+this.value||0);save();renderTax();renderDash();});}
    bind('t_uri','uri');bind('t_keihi','keihi');bind('t_nenkin','nenkin');bind('t_kokuho26','kokuho2026');
    bind('t_kyosai','kyosaiY');bind('t_ideco','idecoY');bind('t_genzen','genzen');
    bind('t_rj','rJuminzei',function(v){return +v||0;});bind('t_rk','rKokuho',function(v){return +v||0;});bind('t_kf','kokuhoFlat');
    $('t_jt').addEventListener('change',function(){state.tax.jigyoTax=this.value==='1';save();renderTax();renderDash();});
    function sum2026(){var inc=0,kei=0,n=0;Object.keys(state.months).forEach(function(m){if(m.slice(0,4)!=='2026')return;n++;var l=ledgerOf(m);inc+=l.income;(state.months[m].exp||[]).forEach(function(x){if((x.cat||'').indexOf('経費')>=0)kei+=(+x.amt||0);});});return {inc:inc,kei:kei,n:n};}
    var s26=sum2026();
    $('t_pullnote').textContent='2026年の記録：'+s26.n+'ヶ月分（売上 '+yen(s26.inc)+' ・ 経費 '+yen(s26.kei)+'）';
    $('t_pull').addEventListener('click',function(){var s=sum2026();if(s.inc>0)state.tax.uri=s.inc;if(s.kei>0)state.tax.keihi=s.kei;save();renderTax();renderDash();});
    $('t_est').addEventListener('click',function(){var s=sum2026();if(s.n>0){if(s.inc>0)state.tax.uri=Math.round(s.inc/s.n*12);if(s.kei>0)state.tax.keihi=Math.round(s.kei/s.n*12);}save();renderTax();renderDash();});
  }

  function renderAll(){ renderDash(); renderInput(); renderGoals(); renderTax(); renderSet(); }
  function switchTab(t){
    active=t;
    ['dash','input','goals','tax','set'].forEach(function(x){$(x).style.display=(x===t)?'block':'none';});
    document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('on',b.dataset.t===t);});
    if(t==='dash')renderDash();
    if(t==='tax')renderTax();
  }
  document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){switchTab(b.dataset.t);});});

  (function(){ load(); renderAll(); switchTab('dash'); })();
})();
</script>
</body>
